name: deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g @google/clasp

      # Recommended: store CLASPRC_JSON_B64 as base64 of ~/.clasprc.json
      - name: Write clasp creds
        run: |
          echo "${{ secrets.CLASPRC_JSON_B64 }}" | base64 -d > ~/.clasprc.json

      # Ensure clasp knows which Apps Script project to target
      # Either commit .clasp.json, or write it from a secret:
      - name: Write .clasp.json
        run: |
          cat > .clasp.json <<'EOF'
          {"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}
          EOF

      - name: Push to Apps Script
        run: clasp push -f

      - name: Create new version
        run: clasp version "CI $GITHUB_SHA"

      - name: Redeploy existing deployment
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          clasp deploy -i "$GAS_DEPLOYMENT_ID" -d "CI redeploy $GITHUB_SHA"
