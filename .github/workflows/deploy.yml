name: deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: npm install -g @google/clasp

      - name: Write clasp creds
        run: |
          echo "${{ secrets.CLASPRC_JSON_B64 }}" | base64 -d > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          cat > .clasp.json <<'EOF'
          {"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"."}
          EOF

      - name: Push to Apps Script
        run: clasp push -f

      - name: Create new version
        run: clasp version "CI $GITHUB_SHA"

      - name: Redeploy existing deployment
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          clasp deploy -i "$GAS_DEPLOYMENT_ID" -d "CI redeploy $GITHUB_SHA"
