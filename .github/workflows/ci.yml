name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format code with Prettier
        run: npx prettier --write .

      - name: Lint / format check
        run: npm run lint

      - name: Sanity tests
        run: npm test
