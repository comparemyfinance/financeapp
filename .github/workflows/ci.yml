name: CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CI should VERIFY formatting, not rewrite it.
      - name: Prettier format check
        run: npx prettier --check .

      - name: Lint
        run: npm run lint

      - name: Syntax validation (Apps Script + embedded template JS)
        run: npm run validate:syntax

      - name: Tests
        run: npm test
