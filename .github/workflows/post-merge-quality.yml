name: Post-merge quality gate

on:
  push:
    branches: ["main"]

concurrency:
  group: post-merge-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Check unresolved merge markers
        run: npm run check:merge-conflicts

      - name: Install dependencies
        run: npm ci

      - name: Validate quality gate
        run: npm run lint && npm test
