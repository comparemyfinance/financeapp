<div class="tab-content p-4 sm:p-6 lg:p-8" id="partner-activity" style="display:none; height: 100%; background-color: var(--pale-green);">
  <div class="max-w-7xl mx-auto space-y-5">
    <div class="rounded-xl shadow-sm border p-5" style="background-color: #ffffff; border-color: #d9e9d9;">
      <h2 class="text-2xl font-bold" style="color: var(--british-racing-green);">Partner Activity</h2>
    </div>

    <div id="partner-activity-status" class="text-sm" style="color: #4b5563;">Loading partner activity…</div>
    <div id="partner-activity-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>
</div>

<script>
(function initPartnerActivityTab(){
  if (window.PartnerActivityTab) return;

  const statusEl = () => document.getElementById('partner-activity-status');
  const gridEl = () => document.getElementById('partner-activity-grid');

  const esc = (v) => String(v == null ? '' : v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

  const ragTheme = (validPct) => {
    if (validPct > 66) {
      return { cardBg: '#ecfdf3', ragPill: 'bg-green-600 text-white', ragLabel: 'Green' };
    }
    if (validPct >= 50) {
      return { cardBg: '#fffbeb', ragPill: 'bg-amber-500 text-white', ragLabel: 'Amber' };
    }
    return { cardBg: '#fef2f2', ragPill: 'bg-red-600 text-white', ragLabel: 'Red' };
  };

  const rankTheme = (index) => {
    if (index === 0) {
      return { outline: '#eab308', rankLabel: '1st', trophy: '🏆', trophyText: 'text-yellow-600', ring: '0 0 0 2px #eab308 inset' };
    }
    if (index === 1) {
      return { outline: '#9ca3af', rankLabel: '2nd', trophy: '🏆', trophyText: 'text-gray-500', ring: '0 0 0 2px #9ca3af inset' };
    }
    if (index === 2) {
      return { outline: '#b45309', rankLabel: '3rd', trophy: '🏆', trophyText: 'text-amber-700', ring: '0 0 0 2px #b45309 inset' };
    }
    return { outline: '#16a34a', rankLabel: '', trophy: '', trophyText: '', ring: '0 0 0 1px #d1d5db inset' };
  };

  const render = (rows) => {
    const status = statusEl();
    const grid = gridEl();
    if (!status || !grid) return;

    if (!Array.isArray(rows) || rows.length === 0) {
      status.className = 'text-sm';
      status.style.color = '#4b5563';
      status.textContent = 'No partner activity found in VRNdata.';
      grid.innerHTML = '';
      return;
    }

    status.className = 'text-sm';
    status.style.color = '#374151';
    status.textContent = `Showing ${rows.length} referer cards, sorted by total VRN searches.`;

    grid.innerHTML = rows.map((item, index) => {
      const validPct = Number(item.validFinancePct || 0);
      const rag = ragTheme(validPct);
      const rank = rankTheme(index);
      return `
        <article class="rounded-xl shadow-sm p-4 border-l-4" style="background:${rag.cardBg}; border-left-color:${rank.outline}; box-shadow:${rank.ring};">
          <div class="flex items-start justify-between gap-2">
            <div>
              <h3 class="text-lg font-semibold" style="color:var(--british-racing-green);">${esc(item.referer || 'Unknown Referer')}</h3>
              ${rank.rankLabel ? `<div class="text-xs font-semibold mt-1" style="color:${rank.outline};">${rank.rankLabel} ${rank.trophy}</div>` : ''}
            </div>
            <span class="text-xs font-semibold px-2 py-1 rounded-full ${rag.ragPill}">RAG: ${rag.ragLabel}</span>
          </div>
          <dl class="mt-4 grid grid-cols-1 gap-2 text-sm" style="color:#374151;">
            <div class="flex justify-between"><dt>Total VRN searches</dt><dd class="font-semibold">${Number(item.totalSearches || 0)}</dd></div>
            <div class="flex justify-between"><dt>Valid finance_company</dt><dd class="font-semibold">${validPct.toFixed(1)}%</dd></div>
            <div class="flex justify-between"><dt>Valid rows</dt><dd>${Number(item.validFinanceCount || 0)}</dd></div>
            <div class="flex justify-between"><dt>Invalid rows</dt><dd>${Number(item.invalidFinanceCount || 0)}</dd></div>
          </dl>
        </article>
      `;
    }).join('');
  };

  window.PartnerActivityTab = {
    loaded: false,
    loading: false,
    async load(force = false) {
      if (this.loading) return;
      if (this.loaded && !force) return;

      const status = statusEl();
      if (status) {
        status.className = 'text-sm';
        status.style.color = '#4b5563';
        status.textContent = 'Loading partner activity…';
      }

      try {
        this.loading = true;
        if (!window.App || typeof App.apiCall !== 'function') throw new Error('CRM app is not ready yet.');
        const response = await App.apiCall('POST', { action: 'getPartnerActivitySummary', payload: {} });
        const rows = Array.isArray(response?.data) ? response.data : [];
        render(rows);
        this.loaded = true;
      } catch (err) {
        const grid = gridEl();
        if (grid) grid.innerHTML = '';
        if (status) {
          status.className = 'text-sm border px-3 py-2 rounded-lg';
          status.style.color = '#b91c1c';
          status.style.backgroundColor = '#fef2f2';
          status.style.borderColor = '#fecaca';
          status.textContent = `Unable to load Partner Activity: ${err && err.message ? err.message : String(err)}`;
        }
      } finally {
        this.loading = false;
      }
    }
  };
})();
</script>
