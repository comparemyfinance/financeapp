                                d="M15.182 15.182a4.5 4.5 0 01-6.364 0M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75s.168-.75.375-.75.375.336.375.75zm4.5 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75z"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                              ></path>
                            </svg>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="ml-4">
                      <button
                        :disabled="sendingMessage || !replyMessage.trim()"
                        @click="sendMessage"
                        class="flex items-center justify-center brand-bg-dark brand-bg-dark-hover rounded-xl text-white px-4 py-1 flex-shrink-0"
                      >
                        <span x-show="!sendingMessage">Send</span>
                        <span x-show="sendingMessage">Sending...</span>
                        <span class="ml-2">
                          <svg
                            class="w-4 h-4 transform rotate-45 -mt-px"
                            fill="none"
                            stroke="currentColor"
                            viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                          >
                            <path
                              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                            ></path>
                          </svg>
                        </span>
                      </button>
                    </div>
                    <div
                      @click.outside="isEmojiPickerOpen = false"
                      class="absolute bottom-24 right-0 z-20"
                      x-cloak=""
                      x-show="isEmojiPickerOpen"
                    >
                      <emoji-picker class="light"></emoji-picker>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div
              @click.self="isSettingsOpen = false"
              class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
              x-cloak=""
              x-show="isSettingsOpen"
            >
              <div
                @click.stop=""
                class="bg-white rounded-lg p-8 shadow-2xl max-w-md w-full"
              >
                <h2 class="text-2xl font-bold mb-4">Settings</h2>
                <p class="text-gray-600 mb-6">
                  Enter your API details to connect to WhatsApp. These are
                  stored only in your browser.
                </p>
                <div class="space-y-4">
                  <div>
                    <label
                      class="block text-sm font-medium text-gray-700"
                      for="accessToken"
                      >Access Token</label
                    >
                    <input
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-green-500 focus:border-green-500 brand-focus-ring"
                      id="accessToken"
                      placeholder="Starts with 'EAAL...'"
                      type="password"
                      x-model="settings.accessToken"
                    />
                  </div>
                  <div>
                    <label
                      class="block text-sm font-medium text-gray-700"
                      for="phoneNumberId"
                      >Phone Number ID</label
                    >
                    <input
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-green-500 focus:border-green-500 brand-focus-ring"
                      id="phoneNumberId"
                      placeholder="e.g., 704223126117310"
                      type="text"
                      x-model="settings.phoneNumberId"
                    />
                  </div>
                  <div>
                    <label
                      class="block text-sm font-medium text-gray-700"
                      for="scriptUrl"
                      >Google Script Web App URL</label
                    >
                    <input
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-green-500 focus:border-green-500 brand-focus-ring"
                      id="scriptUrl"
                      placeholder="The URL from your deployed Google Script"
                      type="text"
                      x-model="settings.scriptUrl"
                    />
                  </div>
                </div>
                <div class="mt-8 flex justify-end space-x-3">
                  <button
                    @click="isSettingsOpen = false"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg"
                  >
                    Cancel
                  </button>
                  <button
                    @click="saveSettings"
                    class="brand-bg-dark brand-bg-dark-hover text-white font-bold py-2 px-4 rounded-lg"
                  >
                    Save and Connect
                  </button>
                </div>
              </div>
            </div>
          </div>
          <script
            defer=""
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
          ></script>
          <script>
            // === OPTIONAL PREFILL (INSECURE) ===
            // Put your real credentials here if you insist.
            // These will live in the HTML file and can be extracted by anyone with file access.
            document.addEventListener("alpine:init", () => {
              Alpine.data("whatsappChat", () => ({
                // --- STATE ---
                isSettingsOpen: false,
                isEmojiPickerOpen: false,
                settings: {
                  accessToken: "",
                  phoneNumberId: "",
                  scriptUrl: "",
                },
                conversations: {},
                activeConversation: null,
                replyMessage: "",
                commonReplies: [
                  "👍 Noted",
                  "Thanks for your message! 😊",
                  "I have updated your Marketing Preferences. Thank you.",
                  "The FCA are due to come back with the findings of the Consultation early October. We'll keep you updated.",
                  "Great — can we start with your vehicle registration (VRN)?",
                  "Perfect, lovely vehicle! We can see your lender and purchase date. How much did you buy the car for, and what deposit was used?",
                  "Do you know your interest rate? If not, I can estimate it from your current monthly payment.",
                  "Thanks — what is your current monthly payment? I can estimate your balloon from that.",
                ],
                sendingMessage: false,
                connectionStatus: "connecting", // can be: 'connecting', 'connected', 'failed'
                pinnedConversations: [], // <-- ADDED: For pinning feature
                // Rotating mascot images (random with fallback)
                mascotImages: [
                  "https://drive.google.com/uc?export=view&id=1pN87QOTcrMHpJM6o16psBV5ZuwetFFYH",
                  "https://drive.google.com/uc?export=view&id=1Kf2kzoUmPDkHOrj_TkezYe0937VUAqzj",
                  "https://drive.google.com/uc?export=view&id=1z1OLTlJGykDP98DAwljiEJN02u6bDLZT",
                  "https://drive.google.com/uc?export=view&id=1CKF3DD9sPJtLzxT28t0sgFN_W3NigU-g",
                  "https://drive.google.com/uc?export=view&id=1NHtgaOBuB2qS9yGyl9jVoX7VOTnlPT0S",
                ],
                fallbackMascot:
                  "https://drive.google.com/uc?export=view&id=1pN87QOTcrMHpJM6o16psBV5ZuwetFFYH",
                mascotImage: "",

                // --- COMPUTED PROPERTIES ---
                // START OF MODIFIED SECTION: Sorting Logic
                get sortedConversations() {
                  const sortedEntries = Object.entries(this.conversations).sort(
                    ([_, a], [__, b]) => {
                      const lastMsgA = a.messages[a.messages.length - 1];
                      const lastMsgB = b.messages[b.messages.length - 1];
                      return (
                        new Date(lastMsgB.timestamp) -
                        new Date(lastMsgA.timestamp)
                      );
                    },
                  );
                  codex / revert -
                    refactor -
                    commit -
                    to -
                    resolve -
                    conflicts -
                    i46h60;

                  const pinned = sortedEntries.filter(([phone, _]) =>
                    this.pinnedConversations.includes(phone),
                  );
                  const unpinned = sortedEntries.filter(
                    ([phone, _]) => !this.pinnedConversations.includes(phone),
                  );

                  const finalSorted = [...pinned, ...unpinned];

                  return finalSorted.reduce(
                    (acc, [key, value]) => ({ ...acc, [key]: value }),
                    {},
                  );
                },
                // END OF MODIFIED SECTION

                get statusText() {
                  switch (this.connectionStatus) {
                    case "connected":
                      return "Connected";
                    case "failed":
                      return "Connection Failed";
                    case "connecting":
                      return "Connecting...";
                    default:
                      return "Idle";
                  }
                },

                // --- METHODS ---
                init() {
                  // 1. Load saved credentials from localStorage
                  const savedSettings =
                    localStorage.getItem("whatsappSettings");
                  if (savedSettings) {
                    try {
                      this.settings = {
                        ...this.settings,
                        ...JSON.parse(savedSettings),
                      };
                    } catch (e) {
                      console.error("Could not parse saved WhatsApp settings.");
                    }
                  }

                  // 2. Validate if all necessary credentials exist
                  if (
                    this.settings.accessToken &&
                    this.settings.phoneNumberId &&
                    this.settings.scriptUrl
                  ) {
                    this.fetchConversations();
                    if (!window.pollingInterval) {
                      window.pollingInterval = setInterval(
                        () => this.fetchConversations(),
                        5000,
                      );
                    }
                  } else {
                    // 3. Missing credentials → force Settings modal open
                    this.isSettingsOpen = true;
                    this.connectionStatus = "failed";
                  }

                  // Close emoji picker when switching conversations
                  this.$watch("activeConversation", () => {
                    this.isEmojiPickerOpen = false;
                  });

                  // Initialize Emoji Picker listener if it exists
                  const picker = this.$root.querySelector("emoji-picker");
                  if (picker) {
                    picker.addEventListener("emoji-click", (event) => {
                      this.replyMessage += event.detail.unicode;
                    });
                  }
                },

                saveSettings() {
                  if (
                    !this.settings.accessToken ||
                    !this.settings.phoneNumberId ||
                    !this.settings.scriptUrl
                  ) {
                    alert("Please fill in all fields.");
                    return;
                  }
                  // Persist credentials to local storage
                  localStorage.setItem(
                    "whatsappSettings",
                    JSON.stringify(this.settings),
                  );

                  this.isSettingsOpen = false;
                  this.conversations = {};
                  this.activeConversation = null;

                  // Attempt connection
                  this.fetchConversations();
                  if (!window.pollingInterval) {
                    window.pollingInterval = setInterval(
                      () => this.fetchConversations(),
                      5000,
                    );
                  }
                },

                async fetchConversations() {
                  if (!this.settings.scriptUrl) {
                    this.connectionStatus = "failed";
                    return;
                  }
                  this.connectionStatus = "connecting";
                  try {
                    const response = await fetch(
                      `${this.settings.scriptUrl}?action=getMessages`,
                    );
                    if (!response.ok) {
                      throw new Error(
                        `Server responded with status: ${response.status}`,
                      );
                    }
                    const data = await response.json();
                    if (data.success) {
                      this.processMessages(data.messages);
                      this.connectionStatus = "connected";
                    } else {
                      throw new Error(
                        data.error ||
                          "Failed to fetch messages from Google Script.",
                      );
                    }
                  } catch (error) {
                    console.error("Error fetching conversations:", error);
                    this.connectionStatus = "failed";
                  }
                },

                processMessages(messages) {
                  // Capture scroll position BEFORE updating DOM
                  const chatbox = this.$refs.chatbox;
                  const hasChatbox = !!chatbox;
                  const wasAtBottom = hasChatbox
                    ? chatbox.scrollHeight -
                        chatbox.scrollTop -
                        chatbox.clientHeight <
                      10
                    : false;
                  const prevScrollTop = hasChatbox ? chatbox.scrollTop : 0;
                  const prevScrollHeight = hasChatbox
                    ? chatbox.scrollHeight
                    : 0;

                  const newConversations = {};
                  messages.forEach((msg) => {
                    const phone = msg.type === "incoming" ? msg.from : msg.to;
                    if (!phone) return;

                    if (!newConversations[phone]) {
                      newConversations[phone] = {
                        name: msg.name || phone,
                        messages: [],
                      };
                    }
                    if (msg.name && msg.name !== phone && msg.name !== "You") {
                      newConversations[phone].name = msg.name;
                    }
                    newConversations[phone].messages.push(msg);
                  });

                  for (const phone in newConversations) {
                    newConversations[phone].messages.sort(
                      (a, b) => new Date(a.timestamp) - new Date(b.timestamp),
                    );
                    if (
                      newConversations[phone].messages.length > 0 &&
                      newConversations[phone].messages[0].type === "incoming"
                    ) {
                      const firstIncomingMessage =
                        newConversations[phone].messages[0];
                      const placeholderTimestamp = new Date(
                        new Date(firstIncomingMessage.timestamp).getTime() -
                          1000,
                      ).toISOString();
                      const placeholderMessage = {
                        timestamp: placeholderTimestamp,
                        from: this.settings.phoneNumberId,
                        to: phone,
                        name: "You",
                        text: "<em>(This conversation was started with an automated template message.)</em>",
                        type: "outgoing",
                      };
                      newConversations[phone].messages.unshift(
                        placeholderMessage,
                      );
                    }
                  }

                  this.conversations = newConversations;

                  // AFTER DOM updates, restore scroll thoughtfully
                  this.$nextTick(() => {
                    const chatboxNow = this.$refs.chatbox;
                    if (!chatboxNow) return;

                    const newScrollHeight = chatboxNow.scrollHeight;

                    // Only auto-scroll if we were already at bottom OR the user is on a different conversation
                    if (wasAtBottom) {
                      chatboxNow.scrollTop = chatboxNow.scrollHeight;
                    } else {
                      // Preserve relative position after re-render
                      const delta = newScrollHeight - prevScrollHeight;
                      chatboxNow.scrollTop = Math.max(0, prevScrollTop + delta);
                    }
                  });
                },

                selectConversation(phone) {
                  this.activeConversation = phone;
                  this.$nextTick(() => {
                    this.scrollToBottom();
                  });
                },
                async sendMessage() {
                  if (!this.replyMessage.trim() || !this.activeConversation)
                    return;
                  this.sendingMessage = true;
                  const textToSend = this.replyMessage.trim();
                  const recipientPhone = this.activeConversation;
                  const apiUrl = `https://graph.facebook.com/v19.0/${this.settings.phoneNumberId}/messages`;
                  const payload = {
                    messaging_product: "whatsapp",
                    to: recipientPhone,
                    type: "text",
                    text: { body: textToSend },
                  };
                  try {
                    const response = await fetch(apiUrl, {
                      method: "POST",
                      headers: {
                        Authorization: `Bearer ${this.settings.accessToken}`,
                        "Content-Type": "application/json",
                      },
                      body: JSON.stringify(payload),
                    });
                    if (response.ok) {
                      await this.logOutgoingMessage(recipientPhone, textToSend);
                      this.replyMessage = "";
                    } else {
                      const error = await response.json();
                      alert(`Failed to send message: ${error.error.message}`);
                    }
                  } catch (error) {
                    alert(`An error occurred: ${error.message}`);
                  } finally {
                    this.sendingMessage = false;
                  }
                },
                async logOutgoingMessage(to, text) {
                  if (!this.settings.scriptUrl) return;
                  try {
                    const response = await fetch(this.settings.scriptUrl, {
                      method: "POST",
                      headers: { "Content-Type": "text/plain;charset=utf-8" },
                      body: JSON.stringify({
                        action: "logOutgoing",
                        to: to,
                        text: text,
                      }),
                    });
                    if (response.ok) {
                      const newMessage = {
                        timestamp: new Date().toISOString(),
                        from: this.settings.phoneNumberId,
                        to: to,
                        name: "You",
                        text: text,
                        type: "outgoing",
                      };
                      if (this.conversations[to]) {
                        this.conversations[to].messages.push(newMessage);
                      }
                      this.$nextTick(() => this.scrollToBottom());
                    } else {
                      console.error(
                        "Failed to log outgoing message to Google Script",
                      );
                    }
                  } catch (error) {
                    console.error("Error logging outgoing message:", error);
                  }
                },
                scrollToBottom(force = false) {
                  const el = this.$refs.chatbox;
                  if (!el) return;
                  const nearBottom =
                    el.scrollHeight - el.scrollTop - el.clientHeight < 10;
                  if (force || nearBottom) {
                    el.scrollTop = el.scrollHeight;
                  }
                },
                formatTimestamp(isoString) {
                  if (!isoString) return "";
                  const date = new Date(isoString);
                  const options = {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false,
                  };
                  const time = date.toLocaleTimeString("en-GB", options);
                  const day = date.getDate();
                  const month = date.toLocaleString("en-GB", {
                    month: "short",
                  });
                  return `${time} | ${day} ${month}`;
                },
              }));
            });
          </script>
          <script>
            /* Fallback tab initialiser (runs even if module script fails). */
            (function () {
              function $all(sel) {
                return Array.prototype.slice.call(
                  document.querySelectorAll(sel),
                );
              }

              function showTab(tabEl) {
                var tabs = $all(".tab-link");
                var panels = $all(".tab-content");
                tabs.forEach(function (t) {
                  t.classList.remove("active-tab");
                });
                panels.forEach(function (p) {
                  p.style.display = "none";
                });

                tabEl.classList.add("active-tab");
                var id = tabEl.getAttribute("data-tab");
                if (!id) return;
                var panel = document.getElementById(id);
                if (panel) panel.style.display = "block";
              }
              function init() {
                var tabs = $all(".tab-link");
                if (!tabs.length) return;
                tabs.forEach(function (t) {
                  t.addEventListener("click", function (e) {
                    e.preventDefault();
                    showTab(t);
                  });
                });
                // Prefer the one already marked active, otherwise first
                var active =
                  document.querySelector(".tab-link.active-tab") || tabs[0];
                showTab(active);
              }
              if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", init);
              } else {
                init();
              }
            })();
          </script>
        </body>
      </html></template
    >
  </div>
</div>
